[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: send all routes to index.html so deep links / refreshes
# (e.g. the TV view) don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Internal tool: keep it out of search engines entirely.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
